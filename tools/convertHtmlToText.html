<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HTML Convert Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
        }
        textarea {
            width: 45%;
            height: 90%;
            margin: 2%;
            padding: 10px;
            font-size: 14px;
            resize: none;
        }
        .container {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: center;
        }
        button {
            height: 50px;
            padding: 0 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Input -->
    <textarea id="input" placeholder="Paste HTML vào đây..."></textarea>

    <!-- Button -->
    <button onclick="convert()">➡ Convert</button>

    <!-- Output -->
    <textarea id="output" placeholder="Kết quả sẽ hiện ở đây..."></textarea>
</div>

<script>
function convert() {
    const html = document.getElementById("input").value;

    const div = document.createElement("div");
    div.innerHTML = html;

    // xử lý span.fake
    div.querySelectorAll("span.fake").forEach(el => {
        const text = el.getAttribute("data-before") || "";
        el.replaceWith(document.createTextNode(text));
    });

    // lấy text
    const result = div.innerText;

    document.getElementById("output").value = result;
}
</script>

</body>
</html>
